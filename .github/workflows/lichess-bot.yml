name: Lichess Bot

on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  LICHESS_TOKEN: ${{ secrets.LICHESS_TOKEN }}
  TOURNAMENT_ID: "OB2F7oaO"  # Added tournament ID

jobs:
  deploy-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Setup engines
      run: |
        echo "Downloading latest Stockfish dev build via downloader script..."
        mkdir -p engines
        curl -fsSL https://raw.githubusercontent.com/ppigazzini/stockfish-downloader/main/posix_helper.sh | sh -s -- -d engines/ -e sf
       if [ ! -f engines/sf ]; then
         mv engines/stockfish/stockfish engines/sf 2>/dev/null || true
         rmdir engines/stockfish 2>/dev/null || true
       fi
        chmod +x engines/sf
         ls -l engines/  # Debug: Check if sf exists
       
        chmod +x engines/stockfish
        chmod +x engines/fairy-stockfish_x86-64-bmi2 || true
        chmod +x engines/ShashChess39 || true
        ls -la engines/

    - name: Configure bot
      run: |
        python3 << 'EOF'
        import yaml, os
        try:
            with open('config.yml', 'r') as f:
                config = yaml.safe_load(f) or {}
            config['token'] = os.environ['LICHESS_TOKEN']
            config.setdefault('engine', {})
            config['engine']['dir'] = './engines'
            config['engine']['name'] = 'stockfish'
            with open('config.yml', 'w') as f:
                yaml.dump(config, f, default_flow_style=False)
            print("✅ Configuration successful")
        except Exception as e:
            print(f"❌ Error: {e}")
            exit(1)
        EOF
        
    - name: Launch bot
      timeout-minutes: 340
      run: |
        echo "🤖 Starting bot in tournament $TOURNAMENT_ID..."
        python3 user_interface.py tournament "$TOURNAMENT_ID"
