name: Lichess Bot

on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  LICHESS_TOKEN: ${{ secrets.LICHESS_TOKEN }}
  TOURNAMENT_ID: "OB2F7oaO" # Added tournament ID

jobs:
  deploy-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350
   
    steps:
    - name: Checkout
      uses: actions/checkout@v4
   
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
   
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y jq unzip
        python -m pip install --upgrade pip
        pip install -r requirements.txt
       
    - name: Setup engines
      run: |
        echo "Fetching latest Stockfish dev build from GitHub Actions..."
        mkdir -p engines
        
        # Get the ID of the most recent successful 'build' workflow run on master branch
        RUN_ID=$(curl -s -H "Accept: application/vnd.github+json" \
          -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          "https://api.github.com/repos/official-stockfish/Stockfish/actions/workflows/build.yml/runs?per_page=1&branch=master&status=success" \
          | jq -r '.workflow_runs[0].id')
        
        echo "Latest successful run ID: $RUN_ID"
        
        # Get the download URL for the Linux x86-64-modern artifact (fallback to base if not found)
        ARTIFACT_URL=$(curl -s -H "Accept: application/vnd.github+json" \
          -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          "https://api.github.com/repos/official-stockfish/Stockfish/actions/runs/$RUN_ID/artifacts" \
          | jq -r '.artifacts[] | select(.name | contains("linux-x86-64-modern")) | .archive_download_url')
        
        if [ -z "$ARTIFACT_URL" ] || [ "$ARTIFACT_URL" == "null" ]; then
          echo "No Linux x86-64-modern artifact found, trying base variant..."
          ARTIFACT_URL=$(curl -s -H "Accept: application/vnd.github+json" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/official-stockfish/Stockfish/actions/runs/$RUN_ID/artifacts" \
            | jq -r '.artifacts[] | select(.name | contains("linux-x86-64")) | .archive_download_url')
          if [ -z "$ARTIFACT_URL" ] || [ "$ARTIFACT_URL" == "null" ]; then
            echo "No suitable artifact found! Available artifacts:"
            curl -s -H "Accept: application/vnd.github+json" \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/official-stockfish/Stockfish/actions/runs/$RUN_ID/artifacts" \
              | jq -r '.artifacts[].name'
            exit 1
          fi
        fi
        
        echo "Downloading from $ARTIFACT_URL..."
        curl -L -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -o stockfish.zip "$ARTIFACT_URL"
        
        unzip -o stockfish.zip -d engines/
        
        # The binary is usually named 'stockfish' in the root of the zip—rename to sf
        if [ -f engines/stockfish ]; then
          mv engines/stockfish engines/sf
        else
          echo "Stockfish binary not found! Extracted files:"
          ls -l engines/
          exit 1
        fi
        
        chmod +x engines/sf
        rm stockfish.zip
        
        # Chmods for other engines (if they exist)
        chmod +x engines/fairy-stockfish_x86-64-bmi2 || true
        chmod +x engines/ShashChess39 || true
        
        # Debug: Verify
        engines/sf --version || echo "Version check failed—binary may still work"
        ls -la engines/
      
    - name: Configure bot
      run: |
        python3 << 'EOF'
        import yaml, os
        try:
            with open('config.yml', 'r') as f:
                config = yaml.safe_load(f) or {}
            config['token'] = os.environ['LICHESS_TOKEN']
            config.setdefault('engine', {})
            config['engine']['dir'] = './engines'
            config['engine']['name'] = 'stockfish'
            with open('config.yml', 'w') as f:
                yaml.dump(config, f, default_flow_style=False)
            print("✅ Configuration successful")
        except Exception as e:
            print(f"❌ Error: {e}")
            exit(1)
        EOF
       
    - name: Launch bot
      timeout-minutes: 340
      run: |
        echo "🤖 Starting bot in tournament $TOURNAMENT_ID..."
        python3 user_interface.py tournament "$TOURNAMENT_ID"
